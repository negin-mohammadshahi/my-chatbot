<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; background: #f4f6f9; }
        h1 { color: #2c3e50; text-align: center; }
        #chat-box { background: white; height: 400px; border-radius: 10px; margin-bottom: 15px; padding: 20px; overflow-y: auto; }
        #input-area { display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { background: #2980b9; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .user-msg { background: #2980b9; color: white; padding: 10px 15px; border-radius: 10px; margin: 5px 0; max-width: 70%; float: right; clear: both; }
        .ai-msg { background: #ecf0f1; color: #333; padding: 10px 15px; border-radius: 10px; margin: 5px 0; max-width: 70%; float: left; clear: both; }
    </style>
</head>
<body>
    <h1>AI Chatbot 🤖</h1>

    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask me anything...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const WORKER_URL = "https://chatbot-proxy.mohammadshahi-negin.workers.dev";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;
            input.value = '';

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="user-msg">${message}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText}`);
                }

                const data = await response.json();
                const reply = data.reply ?? 'پاسخی دریافت نشد.';

                chatBox.innerHTML += `<div class="ai-msg">${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div class="ai-msg">خطا در دریافت پاسخ: ${error.message}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
