<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Code Buddy 👨‍💻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        #chat-box {
            background: #16162a;
            width: 100%;
            max-width: 800px;
            height: 480px;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            border: 1px solid #2a2a45;
        }

        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 4px; }

        .msg-row {
            display: flex;
            margin: 10px 0;
            clear: both;
        }

        .user-row { justify-content: flex-end; }
        .ai-row { justify-content: flex-start; }

        .user-msg, .ai-msg {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 75%;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-msg {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .ai-msg {
            background: #232340;
            color: #e0e0e0;
            border-bottom-right-radius: 4px;
        }

        .ai-msg code {
            background: #0d0d1a;
            color: #4ade80;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }

        .ai-msg pre {
            background: #0d0d1a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            border-right: 3px solid #6366f1;
        }

        .ai-msg pre code {
            background: none;
            padding: 0;
            color: #c9c9e8;
        }

        .typing {
            color: #8888aa;
            font-style: italic;
            font-size: 14px;
        }

        #input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 800px;
        }

        #user-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid #2a2a45;
            background: #16162a;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
        }

        #user-input:focus { border-color: #6366f1; }

        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <h1>👨‍💻 Code Buddy</h1>
    <p class="subtitle">دستیار برنامه‌نویسی شما</p>

    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="سوال برنامه‌نویسی خود را بپرسید...">
        <button onclick="sendMessage()">ارسال</button>
    </div>

    <script>
        const WORKER_URL = "https://chatbot-proxy.mohammadshahi-negin.workers.dev";

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // تبدیل ساده Markdown به HTML (فقط کد بلاک و کد تک‌خطی)
        function formatMessage(text) {
            let escaped = escapeHtml(text);
            // کد بلاک ```...```
            escaped = escaped.replace(/```([a-zA-Z]*)\n?([\s\S]*?)```/g, function(match, lang, code) {
                return `<pre><code>${code.trim()}</code></pre>`;
            });
            // کد تک‌خطی `...`
            escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
            return escaped;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;
            input.value = '';

            const chatBox = document.getElementById('chat-box');

            chatBox.innerHTML += `<div class="msg-row user-row"><div class="user-msg">${escapeHtml(message)}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingId = 'typing-' + Date.now();
            chatBox.innerHTML += `<div class="msg-row ai-row" id="${typingId}"><div class="ai-msg typing">در حال تایپ...</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText}`);
                }

                const data = await response.json();
                const reply = data.reply ?? 'پاسخی دریافت نشد.';

                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg-row ai-row"><div class="ai-msg">${formatMessage(reply)}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg-row ai-row"><div class="ai-msg">خطا در دریافت پاسخ: ${escapeHtml(error.message)}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
