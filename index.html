<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot 🤖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #eaf4fb 0%, #d6e9f7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }

        h1 {
            color: #2c3e50;
            font-size: 30px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #5a7a99;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
        }

        #chat-box {
            background: white;
            width: 100%;
            max-width: 800px;
            height: 480px;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 8px 25px rgba(41, 128, 185, 0.15);
        }

        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-thumb { background: #cfe3f2; border-radius: 4px; }

        .msg-row {
            display: flex;
            margin: 10px 0;
            clear: both;
        }

        .user-row { justify-content: flex-start; }
        .ai-row { justify-content: flex-end; }

        .user-msg, .ai-msg {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 75%;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-msg {
            background: #2980b9;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .ai-msg {
            background: #ecf0f1;
            color: #333;
            border-bottom-right-radius: 4px;
        }

        .ai-msg code {
            background: #e0e8ec;
            color: #c0392b;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }

        .ai-msg pre {
            background: #2c3e50;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            text-align: left;
            direction: ltr;
        }

        .ai-msg pre code {
            background: none;
            padding: 0;
            color: #ecf0f1;
        }

        .typing {
            color: #888;
            font-style: italic;
            font-size: 14px;
        }

        #input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 800px;
        }

        #user-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid #cfe3f2;
            background: white;
            color: #333;
            font-size: 15px;
            outline: none;
        }

        #user-input:focus { border-color: #2980b9; }

        button {
            background: #2980b9;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .clear-btn {
            background: transparent;
            color: #5a7a99;
            font-size: 13px;
            margin-top: 10px;
            text-decoration: underline;
            border: none;
            cursor: pointer;
            padding: 0;
        }
    </style>
</head>
<body>
    <h1>AI Chatbot 🤖</h1>
    <p class="subtitle">دستیار رفع باگ پایتون — کد و خطای خود را بفرستید</p>

    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="کد یا خطای پایتون خود را بنویسید...">
        <button onclick="sendMessage()">ارسال</button>
    </div>
    <button class="clear-btn" onclick="clearChat()">شروع مکالمه جدید</button>

    <script>
        const WORKER_URL = "https://chatbot-proxy.mohammadshahi-negin.workers.dev";

        let conversationHistory = [];

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMessage(text) {
            let escaped = escapeHtml(text);
            escaped = escaped.replace(/```([a-zA-Z]*)\n?([\s\S]*?)```/g, function(match, lang, code) {
                return `<pre><code>${code.trim()}</code></pre>`;
            });
            escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
            return escaped;
        }

        function clearChat() {
            conversationHistory = [];
            document.getElementById('chat-box').innerHTML = '';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;
            input.value = '';

            const chatBox = document.getElementById('chat-box');

            chatBox.innerHTML += `<div class="msg-row user-row"><div class="user-msg">${escapeHtml(message)}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingId = 'typing-' + Date.now();
            chatBox.innerHTML += `<div class="msg-row ai-row" id="${typingId}"><div class="ai-msg typing">در حال تایپ...</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: conversationHistory
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText}`);
                }

                const data = await response.json();
                const reply = data.reply ?? 'پاسخی دریافت نشد.';

                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg-row ai-row"><div class="ai-msg">${formatMessage(reply)}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

                conversationHistory.push({ role: 'user', text: message });
                conversationHistory.push({ role: 'model', text: reply });

                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }

            } catch (error) {
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg-row ai-row"><div class="ai-msg">خطا در دریافت پاسخ: ${escapeHtml(error.message)}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
